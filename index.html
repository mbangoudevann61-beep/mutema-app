<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUTEMA — Espace Membre</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Bebas+Neue&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue-main: #004a99;
            --blue-dark: #002d5f;
            --green-logo: #28a745;
            --gold: #f5c842;
            --text-light: #f8f9fa;
            --bg-dark: #020b16;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-light);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* --- HEADER ANIMÉ (VAGUES & CŒURS) --- */
        .hero {
            position: relative;
            background: linear-gradient(180deg, var(--blue-main) 0%, var(--blue-dark) 100%);
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 50px;
            letter-spacing: 5px;
            z-index: 10;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .slogan {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            z-index: 10;
            color: var(--gold);
        }

        /* Animation Vagues */
        .waves {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/front-end-relative/waves-animation/master/wave.png');
            background-size: 50% 60px;
            animation: wave-move 10s linear infinite;
            opacity: 0.3;
        }
        .wave1 { animation-duration: 7s; opacity: 0.5; z-index: 5; }
        .wave2 { animation-duration: 12s; opacity: 0.2; z-index: 3; bottom: 5px; }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Animation Cœurs & Nuages */
        .floating-heart {
            position: absolute;
            color: rgba(255,255,255,0.2);
            animation: float Up 5s infinite ease-in;
            z-index: 1;
        }
        @keyframes floatUp {
            0% { transform: translateY(200px) scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(2, 11, 22, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--glass);
            z-index: 1000;
        }
        .nav-item {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* --- CARDS & CONTENU --- */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card {
            background: var(--glass);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FORMULAIRES --- */
        select, input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid var(--glass);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: inherit;
        }
        .btn {
            background: var(--blue-main);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .btn-com { background: var(--green-logo); }

        /* --- MUR DE MESSAGES --- */
        .msg-bubble {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--blue-main);
        }
        .msg-bubble.admin { border-left-color: var(--gold); background: rgba(245, 200, 66, 0.05); }
        .msg-meta { font-size: 9px; color: var(--gold); margin-bottom: 5px; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>

<header class="hero">
    <div id="hearts-container"></div>
    <div class="logo-text">MUTEMA</div>
    <div class="slogan">Discipline • Rigueur • Entraide</div>
    <div class="waves">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
    </div>
</header>

<div class="container">
    
    <div id="tab-finances" class="tab-content active">
        <h2 style="margin-bottom:15px; color:var(--gold)">💰 État des Cotisations</h2>
        <div class="card">
            <label>Sélectionner le Membre</label>
            <select id="memberSelect">
                <option>Kamara</option>
                <option>Bermine</option>
                <option>Caprisse Auderey</option>
                <option>Devann</option>
                <option>Carol Charonne</option>
                <option>Achille</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <select id="monthSelect">
                    <option value="Janvier">Janvier</option>
                    <option value="Février">Février</option>
                    <option value="Mars">Mars</option>
                    <option value="Avril">Avril</option>
                    <option value="Mai">Mai</option>
                    <option value="Juin">Juin</option>
                    <option value="Juillet">Juillet</option>
                    <option value="Août">Août</option>
                    <option value="Septembre">Septembre</option>
                    <option value="Octobre">Octobre</option>
                    <option value="Novembre">Novembre</option>
                    <option value="Décembre">Décembre</option>
                </select>
                <select id="yearSelect">
                    <option>2025</option><option>2026</option>
                </select>
            </div>
            <select id="typeSelect">
                <option value="noire">Caisse Noire (1000 FCFA)</option>
                <option value="epargne">Épargne (1000 FCFA)</option>
                <option value="sante">Santé/Décès (5000 FCFA)</option>
            </select>
            <button class="btn" onclick="savePayment()">Enregistrer le versement</button>
        </div>
        <div id="paymentHistory"></div>
    </div>

    <div id="tab-mur" class="tab-content">
        <h2 style="margin-bottom:15px; color:var(--blue-main)">📢 Mur de l'Association</h2>
        
        <div class="card">
            <p style="font-size: 11px; margin-bottom: 5px;">Publier un message (Public)</p>
            <textarea id="publicMsg" placeholder="Votre message ici..."></textarea>
            <button class="btn" onclick="postMessage('public')">Publier sur le mur public</button>
        </div>

        <div id="adminPostArea" class="card" style="border: 1px solid var(--gold);">
            <p style="font-size: 11px; color: var(--gold);">📢 Publication Officielle (COM' uniquement)</p>
            <input type="password" id="comCode" placeholder="Code d'accès COM'">
            <textarea id="comMsg" placeholder="Annonce officielle..."></textarea>
            <button class="btn btn-com" onclick="postMessage('com')">Publier l'annonce</button>
        </div>

        <div id="wallDisplay"></div>
    </div>

</div>

<nav>
    <a href="#" class="nav-item active" onclick="switchTab('finances', this)">
        <i class="fas fa-hand-holding-usd"></i><span>Finances</span>
    </a>
    <a href="#" class="nav-item" onclick="switchTab('mur', this)">
        <i class="fas fa-comments"></i><span>Murs</span>
    </a>
    <a href="#" class="nav-item" onclick="alert('Règlement disponible en PDF')">
        <i class="fas fa-book"></i><span>Règles</span>
    </a>
</nav>

<script>
    // --- CONFIGURATION & DONNÉES ---
    let db = { payments: [], messages: [] };

    // --- ANIMATION CŒURS ---
    function createHeart() {
        const heart = document.createElement('i');
        heart.className = 'fas fa-heart floating-heart';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.getElementById('hearts-container').appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 800);

    // --- NAVIGATION ---
    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        el.classList.add('active');
    }

    // --- LOGIQUE FINANCES ---
    function savePayment() {
        const payment = {
            member: document.getElementById('memberSelect').value,
            month: document.getElementById('monthSelect').value,
            year: document.getElementById('yearSelect').value,
            type: document.getElementById('typeSelect').value,
            date: new Date().toLocaleString()
        };
        db.payments.unshift(payment);
        renderPayments();
        localStorage.setItem('mutema_data', JSON.stringify(db));
        alert("Paiement enregistré !");
    }

    function renderPayments() {
        const container = document.getElementById('paymentHistory');
        container.innerHTML = db.payments.map(p => `
            <div class="card" style="font-size:12px">
                <b style="color:var(--gold)">${p.member}</b> - ${p.type.toUpperCase()}<br>
                Période : ${p.month} ${p.year}<br>
                <small style="opacity:0.5">Enregistré le : ${p.date}</small>
            </div>
        `).join('');
    }

    // --- LOGIQUE MUR ---
    function postMessage(type) {
        const text = type === 'public' ? document.getElementById('publicMsg').value : document.getElementById('comMsg').value;
        const code = document.getElementById('comCode').value;

        if(type === 'com' && code !== '1604') { // Exemple code COM
            alert("Code incorrect !"); return;
        }

        if(!text) return;

        const msg = {
            type: type,
            text: text,
            author: type === 'com' ? "CHARGÉ COM" : "Membre",
            time: new Date().toLocaleTimeString()
        };

        db.messages.unshift(msg);
        renderWall();
        document.getElementById('publicMsg').value = '';
        document.getElementById('comMsg').value = '';
        localStorage.setItem('mutema_data', JSON.stringify(db));
    }

    function renderWall() {
        const container = document.getElementById('wallDisplay');
        container.innerHTML = db.messages.map(m => `
            <div class="msg-bubble ${m.type === 'com' ? 'admin' : ''}">
                <div class="msg-meta">${m.author} • ${m.time}</div>
                <div style="font-size:13px">${m.text}</div>
            </div>
        `).join('');
    }

    // --- INITIALISATION ---
    window.onload = () => {
        const saved = localStorage.getItem('mutema_data');
        if(saved) db = JSON.parse(saved);
        renderPayments();
        renderWall();
    };
</script>

</body>
</html>
