<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUTEMA</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000b18; color:white; font-family:sans-serif; }
.glass { background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; margin-bottom:10px; }
.tab { display:none; }
.tab.active { display:block; }
.nav { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:space-around; background:black; padding:10px; }
button { font-size:12px; }
</style>
</head>

<body class="pb-24 p-3">

<h1 class="text-center text-2xl text-yellow-400 font-bold">MUTEMA</h1>

<div class="nav">
<button onclick="show('finance')">💰</button>
<button onclick="show('public')">🗣</button>
<button onclick="show('annonce')">📢</button>
<button onclick="show('admin')">⚙️</button>
</div>

<!-- FINANCE -->
<div id="finance" class="tab active">
<h2>Finances</h2>
<div id="financeList"></div>
</div>

<!-- PUBLIC -->
<div id="public" class="tab">
<h2>Mur Public</h2>
<button onclick="postPublic()">Publier</button>
<div id="publicList"></div>
</div>

<!-- ANNONCES -->
<div id="annonce" class="tab">
<h2>Annonces (COM)</h2>
<button onclick="postAnnonce()">Publier</button>
<div id="annonceList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
<h2>Gestion (COM)</h2>

<select id="month">
<option>Janvier</option><option>Février</option><option>Mars</option>
<option>Avril</option><option>Mai</option><option>Juin</option>
</select>

<select id="type">
<option value="noire">Caisse Noire</option>
<option value="epargne">Épargne</option>
</select>

<div id="adminList"></div>

<button onclick="viewHistory()">📜 Voir historique</button>
</div>

<script>

// 🔐 CODES MEMBRES
const MEMBER_CODES = {
"Kamara":"1111",
"Bermine":"2222",
"Devann":"3333",
"Carol":"4444",
"Achille":"5555",
"Syntiche":"6666",
"Aurnelia":"7777",
"Alicia":"8888",
"Carmela":"9999",
"Jolene":"1010",
"Eric":"2020"
};

const ADMIN_CODE = "1604";

// 👥 MEMBRES
const members = Object.keys(MEMBER_CODES);

// 💾 DATABASE
let db = JSON.parse(localStorage.getItem("db")) || members.map(n=>({
n, noire:[], epargne:[]
}));

let publicPosts = JSON.parse(localStorage.getItem("public")) || [];
let annonces = JSON.parse(localStorage.getItem("annonces")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// NAV
function show(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
refresh();
}

// 🗣 MUR PUBLIC
function postPublic(){
let code = prompt("Ton code ?");
let author = Object.keys(MEMBER_CODES).find(n=>MEMBER_CODES[n]===code);
if(!author) return alert("Code invalide ❌");

let msg = prompt("Message ?");
if(!msg) return;

let post = {msg, author, date:new Date().toLocaleString()};

publicPosts.unshift(post);
history.unshift({...post, type:"public"});

localStorage.setItem("public", JSON.stringify(publicPosts));
localStorage.setItem("history", JSON.stringify(history));

refresh();
}

// 📢 ANNONCES (COM)
function postAnnonce(){
if(prompt("Code COM ?")!==ADMIN_CODE) return alert("Accès refusé ❌");

let msg = prompt("Annonce ?");
if(!msg) return;

let post = {msg, author:"COM", date:new Date().toLocaleString()};

annonces.unshift(post);
history.unshift({...post, type:"annonce"});

localStorage.setItem("annonces", JSON.stringify(annonces));
localStorage.setItem("history", JSON.stringify(history));

refresh();
}

// 💰 VALIDATION
function toggle(i,type){
if(prompt("Code COM ?")!==ADMIN_CODE) return alert("Accès refusé ❌");

let m = document.getElementById("month").value;

if(db[i][type].includes(m)){
db[i][type] = db[i][type].filter(x=>x!==m);
}else{
db[i][type].push(m);
}

localStorage.setItem("db", JSON.stringify(db));
refresh();
}

// 📜 HISTORIQUE
function viewHistory(){
if(prompt("Code COM ?")!==ADMIN_CODE) return alert("Refusé ❌");

alert(history.map(h=>`${h.date} - ${h.author} : ${h.msg}`).join("\n\n") || "Vide");
}

// 🔄 REFRESH
function refresh(){

financeList.innerHTML = db.map((p,i)=>`
<div class="glass">
<b>${p.n}</b><br>
Noire: ${p.noire.join(", ")}<br>
Epargne: ${p.epargne.join(", ")}
</div>`).join("");

adminList.innerHTML = db.map((p,i)=>`
<div class="glass">
${p.n}
<button onclick="toggle(${i},'noire')">Noire</button>
<button onclick="toggle(${i},'epargne')">Epargne</button>
</div>`).join("");

publicList.innerHTML = publicPosts.map(p=>`
<div class="glass">${p.msg}<br><small>${p.author} - ${p.date}</small></div>`).join("");

annonceList.innerHTML = annonces.map(p=>`
<div class="glass">${p.msg}<br><small>${p.date}</small></div>`).join("");
}

refresh();

</script>

</body>
</html>
